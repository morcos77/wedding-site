<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M ♡ E | Our Wedding</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<img src="images/gif_flower_1.gif" class="bg-gif gif-1">
<img src="images/gif_butterflys.gif" class="bg-gif gif-2">

<div class="hero">
  <img src="images/main.jpeg" class="hero-bg" alt="Wedding">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1 class="animate-pulse">M ♡ E</h1>
    <p>Morcos & Elaria</p>
    <p class="date-label">February 27, 2027</p>
    <div class="countdown" id="countdown"></div>
    
    <button class="qr-button" onclick="openQR()">View QR Code</button>
  </div>
</div>

<div class="section">
  <div class="card">
    <h2>⛪ The Ceremony</h2>
    <p>St. John Church</p>
    <a href="https://maps.app.goo.gl/F59H+JR7" target="_blank" class="map-link">📍 View on Maps</a>
  </div>

  <div class="card">
    <h2>🎉 The Reception</h2>
    <p>Almasa Hall</p>
    <a href="https://maps.app.goo.gl/..." target="_blank" class="map-link">📍 View on Maps</a>
  </div>
</div>

<footer>
    <p>We can't wait to celebrate with you! ✨</p>
</footer>

<div id="qr-popup" class="qr-popup" onclick="closeQR()">
  <div class="qr-content" onclick="event.stopPropagation()">
    <img src="images/qr.png" alt="QR Code">
    <button onclick="closeQR()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
