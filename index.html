<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M ♡ E | Our Wedding</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <img src="images/gif_flower_1.gif" class="decor-gif top-left" alt="flowers">
    <img src="images/gif_butterflys.gif" class="decor-gif bottom-right" alt="butterflies">

    <div class="hero">
        <img src="images/main.jpeg" class="hero-bg" alt="Wedding">
        <div class="overlay"></div>
        <div class="hero-content">
            <img src="images/names.png" alt="Morcos & Elaria" class="names-image">
            <img src="images/nameanddate.png" alt="Date" class="date-image">
            
            <div class="countdown" id="countdown">
                <div class="flip-card"><span id="days">00</span><label>Days</label></div>
                <div class="flip-card"><span id="hours">00</span><label>Hrs</label></div>
                <div class="flip-card"><span id="mins">00</span><label>Min</label></div>
            </div>
            
            <button class="qr-btn" onclick="triggerConfetti()">View QR Code</button>
        </div>
    </div>

    <div class="section">
        <div class="card">
            <h2>⛪ Ceremony</h2>
            <p>St. John Church</p>
            <a href="URL_CHIESA" target="_blank" class="map-link">📍 View on Maps</a>
        </div>
        <div class="card">
            <h2>🎉 Reception</h2>
            <p>Almasa Hall</p>
            <a href="URL_SALA" target="_blank" class="map-link">📍 View on Maps</a>
        </div>
    </div>

    <div id="qr-popup" class="qr-popup" onclick="closeQR()">
        <div class="qr-content" onclick="event.stopPropagation()">
            <img src="images/qr.png" alt="QR Code">
            <button class="close-btn" onclick="closeQR()">✕ Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
