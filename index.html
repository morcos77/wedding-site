<!DOCTYPE html>

<body>

<img src="images/gif_flower_1.gif" class="bg-gif gif-1">

        <span style="color: #ff0000;">♡</span> 
        <span style="color: #89cff0;">E</span>

    <p class="names-text">Morcos & Elaria</p>

    <div class="countdown" id="countdown"></div>

  </div>

  <div class="card">
    <h2>🎉 The Reception</h2>
    <p>Almasa Hall</p>
    <a href="https://www.google.com/maps/place/%D9%82%D8%A7%D8%B9%D8%A9+%D8%A7%D9%84%D9%85%D8%A7%D8%B3%D8%A9+-+El+Masa+Wedding+Hall%E2%80%AD/@30.4816256,31.1701001,17z/data=!3m1!4b1!4m6!3m5!1s0x14f7df4b5c7187ff:0xe81348c192b6d062!8m2!3d30.4816256!4d31.172675!16s%2Fg%2F11cn6q1kwg?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="map-link">📍 View on Maps</a>

    <h2>💌 Private Message</h2>
    <textarea placeholder="Write a sweet message for us..." class="input-field"></textarea>
    <button class="submit-btn">Send Message</button>
  </div>

  <div class="card">
    <h2>📸 Upload Image</h2>
    <input type="file" class="input-field">
    <button class="submit-btn">Upload</button>
  </div>
</div>

<div id="qr-popup" class="qr-popup">

    <img src="images/qr.png" alt="QR Code">
